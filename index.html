<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voibe | Global Talent Bridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>Voibe</h1>
        <p>Breaking barriers. Speaking talent.</p>
        
        <div class="video-overlay">
            <video id="localVideo" autoplay muted></video>
            <div id="subtitle-layer" class="subtitles">System Ready...</div>
        </div>

        <div class="controls">
            <select id="language-select">
                <option value="hi-IN">Hindi (Mother Tongue)</option>
                <option value="en-US">English</option>
                <option value="es-ES">Spanish</option>
            </select>
            <button id="start-btn">Start Live Dubbing</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

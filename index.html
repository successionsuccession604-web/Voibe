<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voibe Global | Talent Bridge</title>
    <link rel="stylesheet" href="style.css">
    <!-- PeerJS Library -->
    <script src="https://unpkg.com"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Voibe</h1>
            <div id="status-bar" style="color: #fbbf24;">Connecting to Server...</div>
        </header>

        <div class="mode-selector">
            <button onclick="window.setMode('audio')" id="btn-audio" class="mode-btn">🎤 Audio Call</button>
            <button onclick="window.setMode('video')" id="btn-video" class="mode-btn active">📹 Video Call</button>
            <button onclick="window.setMode('meeting')" id="btn-meeting" class="mode-btn">👥 Meeting</button>
        </div>

        <div class="video-grid">
            <div class="video-box" id="local-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <span class="label">You</span>
            </div>
            <div class="video-box" id="remote-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <span class="label">Partner</span>
            </div>
        </div>

        <div id="subtitle-layer" class="subtitles">Choose Mode & Click 'Start Live'</div>

        <section class="controls">
            <div class="input-group">
                <input type="text" id="remote-id" placeholder="Paste Partner's ID">
                <button id="call-btn">Connect Globally</button>
            </div>
            
            <div class="input-group">
                <select id="my-lang">
                    <option value="hi-IN">Hindi (हिन्दी)</option>
                    <option value="en-US">English</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="ja-JP">Japanese</option>
                </select>
                <button onclick="window.initMedia()" id="start-btn">Start Live 🟢</button>
            </div>
        </section>
    </div>
    <!-- Simple Script Load -->
    <script src="script.js"></script>
</body>
</html>
